AWSTemplateFormatVersion: "2010-09-09"
Description: MWT core DynamoDB table for problem, manifest, and submission metadata.

Parameters:
  Environment:
    Type: String
    Default: prod
    AllowedValues:
      - prod

Resources:
  CoreTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub mwt-core-table-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: gsi1_pk
          AttributeType: S
        - AttributeName: gsi1_sk
          AttributeType: S
        - AttributeName: gsi2_pk
          AttributeType: S
        - AttributeName: gsi2_sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: gsi1-user-submissions
          KeySchema:
            - AttributeName: gsi1_pk
              KeyType: HASH
            - AttributeName: gsi1_sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: gsi2-submissions-by-status
          KeySchema:
            - AttributeName: gsi2_pk
              KeyType: HASH
            - AttributeName: gsi2_sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true

Outputs:
  CoreTableName:
    Value: !Ref CoreTable
  UserSubmissionsIndexName:
    Value: gsi1-user-submissions
  SubmissionsByStatusIndexName:
    Value: gsi2-submissions-by-status
